<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display:flex; gap:24px; align-items:flex-end; flex-wrap:wrap; padding:14px 0 8px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:#fff; width:96px; height:64px; border-radius:10px; }
  .name { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--g8); }
  .use { font-size:10px; color:var(--gr5); text-align:center; max-width:120px; line-height:1.3; }
</style></head><body>
<div class="card-frame">
  <div class="label">Elevation</div>
  <div class="row">
    <div class="item">
      <div class="box" style="box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05)"></div>
      <div class="name">s1</div>
      <div class="use">default card</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05)"></div>
      <div class="name">s2</div>
      <div class="use">promoted surface</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 8px 24px rgba(0,0,0,.10)"></div>
      <div class="name">s3</div>
      <div class="use">toast · modal</div>
    </div>
    <div class="item">
      <div class="box" style="background:var(--g8);box-shadow:0 2px 8px rgba(0,0,0,.25)"></div>
      <div class="name">s-topbar</div>
      <div class="use">sticky header</div>
    </div>
    <div class="item">
      <div class="box" style="border:1.5px solid var(--g5);box-shadow:0 0 0 3px rgba(61,140,88,.12)"></div>
      <div class="name">s-focus</div>
      <div class="use">focused input ring</div>
    </div>
  </div>
</div>
</body></html>
