<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display:flex; gap:18px; align-items:flex-end; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { background:var(--g6); width:64px; height:64px; }
  .name { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--g8); }
  .px { font-family:var(--mono); font-size:10px; color:var(--gr5); }
  .use { font-size:10px; color:var(--gr7); text-align:center; max-width:80px; line-height:1.3; }
</style></head><body>
<div class="card-frame">
  <div class="label">Radii</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">rsm</div><div class="px">6 px</div><div class="use">score tile</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">rmd</div><div class="px">10 px</div><div class="use">input · num pad · alert</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="name">rlg</div><div class="px">14 px</div><div class="use">card · banner</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">rxl</div><div class="px">20 px</div><div class="use">reserved</div></div>
    <div class="item"><div class="box" style="border-radius:100px;width:96px"></div><div class="name">rpill</div><div class="px">100 px</div><div class="use">chip · badge</div></div>
  </div>
</div>
</body></html>
