<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pair { display:grid; grid-template-columns:60px 1fr; gap:6px; align-items:stretch; }
  .sw { border-radius:8px; padding:8px; font-family:var(--mono); font-size:10px; font-weight:600; display:flex; flex-direction:column; justify-content:space-between; }
  .lite { color:var(--gr7); }
  .use { font-size:11px; color:var(--gr7); padding:4px 0; }
  .use .name { font-weight:700; }
</style></head><body>
<div class="card-frame">
  <div class="label">Semantic accents</div>
  <div class="grid">
    <div class="pair">
      <div class="sw" style="background:#c53030;color:#fff">r5<br/>#c53030</div>
      <div class="sw lite" style="background:#fee2e2">r1<br/>#fee2e2</div>
    </div>
    <div class="pair">
      <div class="sw" style="background:#b45309;color:#fff">a5<br/>#b45309</div>
      <div class="sw lite" style="background:#fef3c7">a1<br/>#fef3c7</div>
    </div>
    <div class="pair">
      <div class="sw" style="background:#1d4ed8;color:#fff">b6<br/>#1d4ed8</div>
      <div class="sw lite" style="background:#dbeafe">b1<br/>#dbeafe</div>
    </div>
  </div>
  <div class="grid" style="font-size:11px;color:var(--gr7)">
    <div><b style="color:#c53030">●</b> Danger · NG · delete · warn-state chip</div>
    <div><b style="color:#b45309">●</b> Saving · "ไม่ปกติ" warn · extra section</div>
    <div><b style="color:#1d4ed8">●</b> Info · score selection · pack station</div>
  </div>
</div>
</body></html>
