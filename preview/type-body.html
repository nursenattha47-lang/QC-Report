<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .specimen { display:flex; align-items:baseline; gap:14px; padding:6px 0; border-bottom:1px solid var(--gr1); }
  .specimen:last-child { border-bottom:0; }
  .meta { font-family:var(--mono); font-size:10px; color:var(--gr5); margin-left:auto; white-space:nowrap; font-weight:500; }
  .glyph { font-family:var(--mono); font-weight:700; }
</style></head><body>
<div class="card-frame">
  <div class="specimen">
    <div style="font-size:16px;font-weight:700;color:var(--g8)">โรงกวน — ข้อมูลผู้รายงาน</div>
    <span class="meta">h3 / card-title 16/700</span>
  </div>
  <div class="specimen">
    <div style="font-size:17px;line-height:1.4">เปรี้ยวอมหวาน — รสชาติปกติ ทำงานครบทุกเครื่อง</div>
    <span class="meta">body 17/400 · 1.4 leading</span>
  </div>
  <div class="specimen">
    <div style="font-size:16px;font-weight:700;color:var(--gr7)"><span class="glyph">✓</span> ใช้งาน — เครื่อง 1, 2, 3</div>
    <span class="meta">control 16/700</span>
  </div>
  <div class="specimen">
    <div style="font-size:14px;font-weight:700;color:var(--gr7)"><span class="glyph">!</span> ไม่ปกติ · cchip</div>
    <span class="meta">chip-sm 14/700</span>
  </div>
</div>
</body></html>
