<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .topbar { background:#1a3a2a; color:#fff; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-radius:8px 8px 0 0; }
  .topbar-co { font-size:12px; color:#7ecf97; letter-spacing:.5px; }
  .topbar-title { font-size:20px; font-weight:700; }
  .topbar-status { font-size:13px; color:#7ecf97; display:flex; align-items:center; gap:6px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#52aa70; }
  .tabs { background:#fff; border-bottom:1px solid #d1d5db; display:flex; }
  .tab { flex:1; padding:14px 8px; font-size:16px; font-weight:400; color:#6b7280; text-align:center; border-bottom:2.5px solid transparent; }
  .tab.active { color:#245233; border-bottom-color:#3d8c58; font-weight:700; }

  .hist-list { background:#f9fafb; padding:12px 16px; border-radius:0 0 8px 8px; display:flex; flex-direction:column; gap:8px; }
  .hist-item { background:#fff; border:1px solid #d1d5db; border-radius:10px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
  .hist-main { flex:1; min-width:0; }
  .hist-date { font-size:16px; font-weight:700; color:#1a3a2a; }
  .hist-meta { font-size:13px; color:#6b7280; margin-top:3px; }
  .hist-actions { display:flex; gap:6px; flex-shrink:0; }
  .btn-view { background:#fff; border:1.5px solid #52aa70; color:#245233; font-family:var(--font); font-size:13px; font-weight:700; padding:8px 14px; border-radius:100px; min-height:36px; }
  .btn-pdf { background:#c53030; color:#fff; border:none; font-family:var(--font); font-size:13px; font-weight:700; padding:8px 14px; border-radius:100px; min-height:36px; display:inline-flex; align-items:center; gap:6px; }
  .pdf-glyph { font-family:var(--mono); font-weight:800; font-size:11px; background:#fff; color:#c53030; padding:1px 5px; border-radius:3px; }
</style></head><body>
<div class="card-frame">
  <div>
    <div class="topbar">
      <div>
        <div class="topbar-co">บริษัท อัญชลี ฟรุ๊ต โปรดักส์ จำกัด</div>
        <div class="topbar-title">ระบบ QC ประจำวัน</div>
      </div>
      <div class="topbar-status"><div class="dot"></div><span>บันทึกแล้ว</span></div>
    </div>
    <div class="tabs">
      <div class="tab">กรอก QC</div>
      <div class="tab active">ประวัติ</div>
    </div>
    <div class="hist-list">
      <div class="hist-item">
        <div class="hist-main">
          <div class="hist-date">26 พ.ค. 2569</div>
          <div class="hist-meta">6 รอบ · 42 LOT · ผู้รายงาน: อัญชลี</div>
        </div>
        <div class="hist-actions">
          <button class="btn-view">ดู</button>
          <button class="btn-pdf"><span class="pdf-glyph">PDF</span>ส่งออก</button>
        </div>
      </div>
      <div class="hist-item">
        <div class="hist-main">
          <div class="hist-date">25 พ.ค. 2569</div>
          <div class="hist-meta">6 รอบ · 38 LOT · ผู้รายงาน: อัญชลี</div>
        </div>
        <div class="hist-actions">
          <button class="btn-view">ดู</button>
          <button class="btn-pdf"><span class="pdf-glyph">PDF</span>ส่งออก</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
