<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .alert { border-radius:10px; padding:11px 14px; font-size:14px; font-weight:700; }
  .alert.ok { background:#e1f5e9; color:#245233; }
  .alert.warn { background:#fee2e2; color:#c53030; }
  .alert.info { background:#dbeafe; color:#1d4ed8; }
  .alert.note { background:#fef3c7; color:#b45309; }
  .alert-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; opacity:.85; font-weight:700; }
  .alert-body { font-weight:400; }
</style></head><body>
<div class="card-frame">
  <div class="alert ok">บอยเลอร์ทำงานปกติทุกรายการ</div>
  <div class="alert warn"><div class="alert-label">สาเหตุ / วิธีแก้ไข</div><div class="alert-body">อุณหภูมิเกิน 40°C — ลดไฟ + รอเครื่องเย็น 10 นาที</div></div>
  <div class="alert note"><div class="alert-label">กรณีสีผิดปกติ — แนวทางแก้ไข</div><div class="alert-body">เติมแบะแซเพิ่ม 5% เพื่อปรับความใส</div></div>
  <div class="alert info">บันทึกเวลา: 09:42 น.</div>
</div>
</body></html>
