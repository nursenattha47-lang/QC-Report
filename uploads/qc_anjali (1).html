<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ระบบ QC อัญชลี</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --g9:#0d2b1a;--g8:#1a3a2a;--g7:#245233;--g6:#2e6b42;--g5:#3d8c58;--g4:#52aa70;--g3:#7ecf97;--g2:#b5e8c5;--g1:#e1f5e9;--g0:#f2faf5;
  --r5:#c53030;--r1:#fee2e2;--a5:#b45309;--a1:#fef3c7;--b6:#1d4ed8;--b1:#dbeafe;
  --gr9:#111827;--gr7:#374151;--gr5:#6b7280;--gr3:#d1d5db;--gr1:#f3f4f6;--gr0:#f9fafb;
  --w:#ffffff;
  --rsm:6px;--rmd:10px;--rlg:14px;--rxl:20px;
  --s1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --s2:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --s3:0 8px 24px rgba(0,0,0,.10);
  --font:'IBM Plex Sans Thai',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--gr0);color:var(--gr9);font-size:14px;min-height:100vh;overscroll-behavior:none;}

/* ── TOPBAR ── */
.topbar{background:var(--g8);color:var(--w);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;max-width:680px;margin:0 auto;}
.topbar-co{font-size:10px;color:var(--g3);letter-spacing:.5px;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-status{font-size:11px;font-weight:500;color:var(--g3);display:flex;align-items:center;gap:5px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--g4);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── RECOVERY BANNER ── */
.recovery-banner{background:#7c3aed;color:#fff;padding:10px 16px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.recovery-banner.hidden{display:none;}
.btn-restore{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);border-radius:100px;padding:5px 14px;font-family:var(--font);font-size:12px;font-weight:700;color:#fff;cursor:pointer;}
.btn-dismiss{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}

/* ── SYNC BANNER ── */
.sync-banner{padding:8px 16px;font-size:11px;font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;}
.sync-banner.syncing{background:var(--a1);color:var(--a5);}
.sync-banner.saved{background:var(--g1);color:var(--g7);}
.sync-banner.offline{background:var(--r1);color:var(--r5);}
.sync-banner.hidden{display:none;}

/* ── TABS ── */
.tabs-wrap{background:var(--w);border-bottom:1px solid var(--gr3);}
.tabs{display:flex;max-width:680px;margin:0 auto;}
.tab-btn{flex:1;padding:12px 8px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--gr5);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all .2s;}
.tab-btn.active{color:var(--g7);border-bottom-color:var(--g5);font-weight:700;}

/* ── LAYOUT ── */
.page{display:none;}.page.active{display:block;}
.wrap{max-width:680px;margin:0 auto;padding:16px;}

/* ── CARDS ── */
.card{background:var(--w);border-radius:var(--rlg);border:1px solid var(--gr3);box-shadow:var(--s1);margin-bottom:12px;overflow:hidden;}
.card-head{padding:12px 16px;border-bottom:1px solid var(--gr1);display:flex;justify-content:space-between;align-items:center;background:var(--gr0);}
.card-title{font-size:13px;font-weight:700;color:var(--g8);display:flex;align-items:center;gap:7px;}
.card-body{padding:14px 16px;}

/* ── FORM ── */
.field{margin-bottom:14px;}.field:last-child{margin-bottom:0;}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--gr5);text-transform:uppercase;margin-bottom:6px;}
.inp,.ta{width:100%;padding:9px 12px;border:1.5px solid var(--gr3);border-radius:var(--rmd);font-family:var(--font);font-size:14px;color:var(--gr9);background:var(--w);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;}
.inp:focus,.ta:focus{border-color:var(--g5);box-shadow:0 0 0 3px rgba(61,140,88,.12);}
.ta{resize:vertical;}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:9px 16px;border:1.5px solid var(--gr3);border-radius:100px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--gr7);background:var(--w);cursor:pointer;transition:all .15s;white-space:nowrap;min-height:44px;display:flex;align-items:center;}
.chip.ok{background:var(--g7);border-color:var(--g7);color:var(--w);}
.chip.ng{background:var(--r5);border-color:var(--r5);color:var(--w);}
.chip.warn{background:var(--a5);border-color:var(--a5);color:var(--w);}
.chip.gray{background:var(--gr7);border-color:var(--gr7);color:var(--w);}
.chip.blue{background:var(--b6);border-color:var(--b6);color:var(--w);}

/* ── NUM GRID ── */
.num-grid{display:flex;flex-wrap:wrap;gap:6px;}
.num-btn{width:44px;height:44px;border:1.5px solid var(--gr3);border-radius:var(--rmd);font-family:var(--mono);font-size:13px;font-weight:600;color:var(--gr7);background:var(--w);cursor:pointer;transition:all .15s;}
.num-btn.on{background:var(--g7);border-color:var(--g7);color:var(--w);}
.num-btn.sm{width:38px;height:38px;font-size:12px;}

/* ── SCORE ── */
.score-row{display:flex;gap:5px;flex-wrap:wrap;}
.score-btn{width:40px;height:40px;border:1.5px solid var(--gr3);border-radius:var(--rsm);font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gr5);background:var(--w);cursor:pointer;transition:all .15s;}
.score-btn.on{background:var(--b6);border-color:var(--b6);color:var(--w);}

/* ── ALERTS ── */
.alert{border-radius:var(--rmd);padding:10px 14px;margin-top:8px;font-size:12px;font-weight:600;}
.alert.ok{background:var(--g1);color:var(--g7);}
.alert.warn{background:var(--r1);color:var(--r5);}
.alert.info{background:var(--b1);color:var(--b6);}
.alert.note{background:var(--a1);color:var(--a5);}
.alert-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}

/* ── ROUND GRID ── */
.round-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.round-btn{padding:13px 6px;border-radius:var(--rmd);border:1.5px solid var(--gr3);background:var(--w);cursor:pointer;position:relative;font-family:var(--font);text-align:center;transition:all .15s;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.round-btn.done::after{content:'✓';position:absolute;top:4px;right:7px;font-size:10px;font-weight:800;color:var(--g5);}
.round-ico{font-size:20px;margin-bottom:4px;}
.round-lbl{font-size:10px;font-weight:700;line-height:1.3;color:var(--gr7);}

/* ── ROUND BANNER ── */
.round-banner{border-radius:var(--rlg);padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;color:var(--w);}
.round-banner-name{font-size:18px;font-weight:700;}
.round-banner-sub{font-size:11px;opacity:.8;margin-bottom:3px;}
.time-badge{font-family:var(--mono);font-size:12px;font-weight:500;background:rgba(255,255,255,.2);border-radius:100px;padding:4px 11px;}

/* ── COLLAPSIBLE ── */
.section{border:1px solid var(--gr3);border-radius:var(--rlg);overflow:hidden;margin-bottom:10px;box-shadow:var(--s1);}
.section-head{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;cursor:pointer;background:var(--w);transition:background .15s;min-height:52px;}
.section-head:hover{background:var(--gr0);}
.section-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.section-arrow{font-size:13px;color:var(--gr5);transition:transform .2s;}
.section-arrow.open{transform:rotate(180deg);}
.section-body{padding:14px 16px;background:var(--w);border-top:1px solid var(--gr1);}
.section-body.hidden{display:none;}

/* ── DIVIDER ── */
.div{height:1px;background:var(--gr1);margin:14px 0;}

/* ── LOT ── */
.lot-summary{background:var(--g8);color:var(--w);border-radius:var(--rlg);padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.lot-summary-num{font-size:36px;font-weight:800;color:var(--g3);font-family:var(--mono);}
.lot-sub{font-size:10px;opacity:.7;letter-spacing:.5px;}
.lot-item{border:1px solid var(--gr3);border-radius:var(--rmd);padding:12px;margin-bottom:8px;background:var(--gr0);}
.lot-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.lot-item-num{font-size:12px;font-weight:700;color:var(--g8);}
.btn-lot-del{font-size:11px;font-weight:600;color:var(--r5);background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px 8px;border-radius:var(--rsm);transition:background .15s;min-height:36px;}
.btn-lot-del:hover{background:var(--r1);}
.btn-add-lot{width:100%;padding:12px;border:2px dashed var(--g4);border-radius:var(--rmd);background:transparent;color:var(--g6);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;min-height:48px;}
.btn-add-lot:hover{background:var(--g0);}

/* ── LOT BUILDER ── */
.lot-builder{background:var(--g0);border:1.5px solid var(--g2);border-radius:var(--rmd);padding:12px;margin-bottom:10px;}
.lot-builder-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g6);margin-bottom:10px;}
.lot-builder-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;align-items:end;margin-bottom:8px;}
@media(max-width:480px){.lot-builder-grid{grid-template-columns:1fr 1fr 1fr;}}
.lot-builder-result{display:flex;align-items:center;gap:8px;background:var(--w);border:1.5px solid var(--g3);border-radius:var(--rmd);padding:9px 12px;margin-bottom:8px;}
.lot-builder-result-code{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--g8);flex:1;letter-spacing:1px;}
.btn-lot-apply{font-family:var(--font);font-size:12px;font-weight:700;padding:8px 14px;border-radius:100px;background:var(--g6);color:var(--w);border:none;cursor:pointer;transition:background .15s;white-space:nowrap;min-height:40px;}
.lot-sel{width:100%;padding:8px 10px;border:1.5px solid var(--gr3);border-radius:var(--rmd);font-family:var(--font);font-size:13px;color:var(--gr9);background:var(--w);outline:none;-webkit-appearance:none;}
.lot-sel:focus{border-color:var(--g5);}
.lot-sel-label{font-size:10px;font-weight:700;color:var(--gr5);text-transform:uppercase;margin-bottom:4px;letter-spacing:.4px;}

/* ── CRITERIA CHIPS ── */
.criteria-group{margin-bottom:8px;}.criteria-group:last-child{margin-bottom:0;}
.criteria-group-label{font-size:11px;font-weight:700;color:var(--gr7);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.criteria-chips{display:flex;flex-wrap:wrap;gap:5px;}
.cchip{padding:7px 13px;border:1.5px solid var(--gr3);border-radius:100px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--gr7);background:var(--w);cursor:pointer;transition:all .15s;white-space:nowrap;min-height:38px;display:flex;align-items:center;}
.cchip.ok{background:var(--g7);border-color:var(--g7);color:var(--w);}
.cchip.ng{background:var(--r5);border-color:var(--r5);color:var(--w);}
.cchip.warn{background:var(--a5);border-color:var(--a5);color:var(--w);}

/* ── MACHINE CARD ── */
.machine-card{border:1px solid var(--gr3);border-radius:var(--rmd);padding:11px 13px;margin-bottom:8px;background:var(--gr0);}
.machine-card-title{font-size:12px;font-weight:700;color:var(--gr7);margin-bottom:8px;}

/* ── EXTRA ── */
.extra-section{border:1.5px dashed var(--a5);border-radius:var(--rlg);overflow:hidden;margin-bottom:12px;}
.extra-head{padding:11px 14px;background:var(--a1);display:flex;justify-content:space-between;align-items:center;}
.extra-title{font-size:13px;font-weight:700;color:var(--a5);}
.extra-body{padding:14px 16px;background:var(--w);}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:var(--rmd);border:1.5px solid var(--gr3);background:var(--gr0);margin-bottom:7px;cursor:pointer;transition:all .15s;min-height:48px;}
.checkbox-row.checked{border-color:var(--g4);background:var(--g0);}
.checkbox-row input[type=checkbox]{width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:var(--g6);}
.checkbox-lbl{font-size:13px;font-weight:600;color:var(--gr7);}
.checkbox-row.checked .checkbox-lbl{color:var(--g8);}

/* ── PHOTO ── */
.photo-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.photo-thumb{position:relative;display:inline-block;}
.photo-thumb img{width:72px;height:72px;border-radius:var(--rmd);object-fit:cover;border:2px solid var(--g3);}
.photo-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:var(--r5);color:var(--w);border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-upload-label{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:var(--rmd);border:1.5px dashed var(--g3);background:var(--g0);color:var(--g6);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;min-height:48px;}

/* ── DONE BOX ── */
.done-box{border-radius:var(--rlg);padding:14px 16px;margin-bottom:12px;}
.done-box.pending{background:var(--gr0);border:1px solid var(--gr3);}
.done-box.complete{background:var(--g0);border:1.5px solid var(--g4);}
.done-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.done-label{font-size:13px;font-weight:700;color:var(--gr9);}

/* ── BUTTONS ── */
.btn{width:100%;padding:15px;border:none;border-radius:var(--rmd);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;min-height:52px;}
.btn-primary{background:var(--g6);color:var(--w);}
.btn-primary:active{background:var(--g7);}
.btn-dark{background:var(--g9);color:var(--w);}
.btn-dark:active{background:var(--g8);}
.btn-outline{background:var(--w);color:var(--g7);border:2px solid var(--g4);}
.btn-gap{margin-bottom:10px;}
.btn-sm{font-family:var(--font);font-size:11px;font-weight:700;padding:6px 14px;border-radius:100px;border:1px solid var(--g4);background:var(--w);color:var(--g7);cursor:pointer;transition:all .15s;min-height:36px;}

/* ── HISTORY ── */
.hist-item{border:1px solid var(--gr3);border-radius:var(--rlg);padding:13px 16px;margin-bottom:10px;background:var(--w);box-shadow:var(--s1);}
.hist-date{font-size:14px;font-weight:700;color:var(--g8);}
.hist-meta{font-size:12px;color:var(--gr5);margin-top:3px;}
.hist-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.hist-badge.ok{background:var(--g1);color:var(--g7);}
.hist-badge.warn{background:var(--r1);color:var(--r5);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--g9);color:var(--w);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;box-shadow:var(--s3);opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;}

/* ── TWO COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.two-col{grid-template-columns:1fr;}}

/* ── OFFLINE INDICATOR ── */
#offlineOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:none;align-items:center;justify-content:center;}
#offlineOverlay.show{display:flex;}
.offline-box{background:var(--w);border-radius:var(--rlg);padding:24px;text-align:center;max-width:280px;margin:16px;}
.offline-icon{font-size:40px;margin-bottom:12px;}
.offline-title{font-size:16px;font-weight:700;color:var(--gr9);margin-bottom:6px;}
.offline-sub{font-size:12px;color:var(--gr5);}
</style>
</head>
<body>

<!-- RECOVERY BANNER -->
<div id="recoveryBanner" class="recovery-banner hidden">
  <span>🔄 พบข้อมูลที่บันทึกไว้ก่อนหน้า — ต้องการกู้คืนหรือไม่?</span>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button class="btn-restore" onclick="restoreDraft()">กู้คืน</button>
    <button class="btn-dismiss" onclick="dismissRecovery()">✕</button>
  </div>
</div>

<!-- SYNC BANNER -->
<div id="syncBanner" class="sync-banner hidden"></div>

<!-- TOPBAR -->
<header>
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="topbar-co">บริษัท อัญชลี ฟรุ๊ต โปรดักส์ จำกัด</div>
        <div class="topbar-title">📊 ระบบ QC ประจำวัน</div>
      </div>
      <div id="saveBar" class="topbar-status">
        <div class="status-dot"></div>
        <span>พร้อมใช้งาน</span>
      </div>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchPage('form',this)">📋 กรอก QC</button>
      <button class="tab-btn" onclick="switchPage('hist',this)">📁 ประวัติ</button>
    </div>
  </div>
</header>

<!-- FORM PAGE -->
<div id="page-form" class="page active">
  <div class="wrap">

    <div class="card">
      <div class="card-head"><div class="card-title">👤 ข้อมูลผู้รายงาน</div></div>
      <div class="card-body">
        <div class="two-col">
          <div class="field">
            <label class="lbl">วันที่</label>
            <input type="date" id="f_date" class="inp" oninput="fieldChanged()"/>
          </div>
          <div class="field">
            <label class="lbl">ชื่อผู้รายงาน</label>
            <input type="text" id="f_rep" class="inp" value="อัญชลี" oninput="fieldChanged()"/>
          </div>
        </div>
      </div>
    </div>

    <!-- PRE-CHECK -->
    <div class="card">
      <div class="card-head"><div class="card-title">1️⃣ จิ้มสินค้าทุก LOT ที่ไม่ได้ล็อคผลิตวันนี้</div></div>
      <div class="card-body">
        <div class="field">
          <label class="lbl">สถานะ</label>
          <div class="chips">
            <button class="chip" id="pc_yes" onclick="setPc('yes')">✅ ทำเสร็จแล้ว</button>
            <button class="chip" id="pc_no" onclick="setPc('no')">❌ ยังไม่เสร็จ</button>
          </div>
          <div id="pc_time" style="display:none;margin-top:8px"></div>
        </div>
        <div class="field">
          <label class="lbl">Comment — ความนิ่ม / เหนียว / กลิ่น / สี</label>
          <textarea id="f_pcc" class="ta" rows="2" oninput="fieldChanged()"></textarea>
        </div>
        <div class="field">
          <label class="lbl">LOT ที่ต้องแก้ไข</label>
          <input type="text" id="f_pcf" class="inp" placeholder="-" oninput="fieldChanged()"/>
        </div>
      </div>
    </div>

    <!-- ROUND SELECTOR -->
    <div class="card">
      <div class="card-head"><div class="card-title">⏱️ เลือกรอบ QC</div></div>
      <div class="card-body">
        <div class="round-grid" id="roundGrid"></div>

/* ═══════════════════════════════════════════════════
   INDEXEDDB
═══════════════════════════════════════════════════ */
function openIDB(){
  return new Promise((resolve,reject)=>{
    if(_idbDb){ resolve(_idbDb); return; }
    let req = indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded = e=>{ e.target.result.createObjectStore(IDB_STORE); };
    req.onsuccess = e=>{ _idbDb=e.target.result; resolve(_idbDb); };
    req.onerror = ()=>reject(req.error);
  });
}
async function idbSave(data){
  try {
    let db = await openIDB();
    return new Promise((resolve,reject)=>{
      let tx = db.transaction(IDB_STORE,"readwrite");
      tx.objectStore(IDB_STORE).put(JSON.stringify(data), IDB_KEY);
      tx.oncomplete = ()=>resolve(true);
      tx.onerror = ()=>reject(tx.error);
    });
  } catch(e){ console.warn("IDB save failed:",e); return false; }
}
async function idbLoad(){
  try {
    let db = await openIDB();
    return new Promise((resolve,reject)=>{
      let tx = db.transaction(IDB_STORE,"readonly");
      let req = tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = ()=>resolve(req.result ? JSON.parse(req.result) : null);
      req.onerror = ()=>reject(req.error);
    });
  } catch(e){ return null; }
}
async function idbClear(){
  try {
    let db = await openIDB();
    return new Promise((resolve)=>{
      let tx = db.transaction(IDB_STORE,"readwrite");
      tx.objectStore(IDB_STORE).delete(IDB_KEY);
      tx.oncomplete = ()=>resolve();
    });
  } catch(e){}
}

function saveDraftNow(){
  let snapshot = JSON.stringify(ST);
  // Layer 1: localStorage
  try{ localStorage.setItem(LS_KEY, snapshot); } catch(e){}
  // Layer 2: sessionStorage
  try{ sessionStorage.setItem(LS_KEY, snapshot); } catch(e){}
  // Layer 3: IndexedDB
  idbSave(ST);
  // Update status
  ST._savedAt = new Date().toISOString();
}

function saveDraftDebounced(){
  setSaveBar("saving");
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    saveDraftNow();
    setSaveBar("saved");
  }, 600);
}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
async function checkForDraft(){
  let raw = null;
  // Try localStorage first
  try{ raw = localStorage.getItem(LS_KEY); } catch(e){}
  // Fallback: sessionStorage
  if(!raw){ try{ raw = sessionStorage.getItem(LS_KEY); } catch(e){} }
  // Fallback: IndexedDB
  if(!raw){
    let idbData = await idbLoad();
    if(idbData) raw = JSON.stringify(idbData);
  }
  if(!raw) return;
  try {
    let saved = JSON.parse(raw);
    // Check if it's for today
    let today = new Date().toISOString().slice(0,10);
    if(saved.date === today || saved._savedAt){
      // Show recovery banner
      window._pendingDraft = saved;
      document.getElementById("recoveryBanner").classList.remove("hidden");
    } else {
      // Old date — just load silently
      loadState(saved);
    }
  } catch(e){ console.warn("Draft parse error:",e); }
}

  if(!window._pendingDraft) return;

function addLot(){ ST.rounds[AR].lots.push(newLot()); autosave(); renderRoundForm(); }
function delLot(i){ ST.rounds[AR].lots.splice(i,1); autosave(); renderRoundForm(); }
function setLotC(i,f,v){ ST.rounds[AR].lots[i][f]=v; autosave(); renderRoundForm(); }
function updateLotBuilder(i){
  let l=ST.rounds[AR].lots[i];
  ["code","oven","day","month","year"].forEach(f=>{
    let el=document.getElementById("lb_"+f+"_"+i);
    if(el){ if(f==="code") l.bcode=el.value; else l["b"+f]=el.value.trim(); }
  });
  autosave();
  let pre=document.getElementById("lb_preview_"+i);
  if(pre) pre.textContent=l.bcode?(l.bcode+(l.boven||"?")+"-"+(l.bday||"?")+"-"+(l.bmonth||"?")+"-"+(l.byear||"?")+"-"+(l.btimes||"?")):"— เลือกรหัสก่อน —";
}
function buildLotCode(i){
  let l=ST.rounds[AR].lots[i];
  if(!l.bcode) return;
  ["oven","day","month","year"].forEach(f=>{
    let el=document.getElementById("lb_"+f+"_"+i);
    if(el) l["b"+f]=el.value.trim();
  });
  l.num=l.bcode+(l.boven||"1")+"-"+(l.bday||"1")+"-"+(l.bmonth||"1")+"-"+(l.byear||"26")+"-"+(l.btimes||"1");
  autosave(); renderRoundForm();
}

   SUPABASE SAVE

function lotSummary(l){
  let parts=[];
  if(l.taste==="ok") parts.push("รสชาติ: ปกติ");
  else if(l.taste==="ng") parts.push("รสชาติ: ไม่ปกติ");
  if(l.smell==="ok") parts.push("กลิ่น: ปกติ");
  else if(l.smell==="ng") parts.push("กลิ่น: ไม่ปกติ");
  if(l.color==="ok") parts.push("สี: ปกติ");
  else if(l.color==="dark") parts.push("สี: เข้มเกิน");
  else if(l.color==="light") parts.push("สี: สว่างเกิน");
  return parts.join(" | ");
}

function rmSummary(rmCheck,key){
  if(!rmCheck) return "-";
  let ck=rmCheck[key]||{};
  if(!ck.sel) return "-";
  let base=ck.contam==="found"?"พบสิ่งปนเปื้อน":"ไม่พบสิ่งปนเปื้อน";
  if(ck.detail) base+=" / "+ck.detail;
  if(ck.note) base+=" ("+ck.note+")";
  return base;
}

async function doSave(){
  syncFieldsToState();
  let doneRounds = RM.filter(r=>ST.rounds[r.k].done);
  if(doneRounds.length===0){
    toast("⚠️ ยังไม่มีรอบที่กด 'ยืนยันจบ' — กด 🏁 ก่อนบันทึก");
    return;
  }
  if(!_isOnline){
    toast("📵 ออฟไลน์ — ข้อมูลบันทึกในเครื่องแล้ว");
    return;
  }
  setSyncBanner("syncing","⏳ กำลังบันทึกลง Supabase...");
  let errors = [];
  for(let r of doneRounds){
    let rd=ST.rounds[r.k];
    let b=rd.boiler||{};
    let st=rd.stir||{};
    let ml=rd.mill||{};
    let pk=rd.pack||{};
    let ed=rd.ed||{};
    let rmCheck=ml.rmCheck||{};
    let bOk=["temp","press","water","pump"].every(k=>b[k]==="ok")&&b.smoke==="none";
    let millParts=[];
    (ml.mc||[]).forEach(n=>millParts.push("เครื่อง"+n+":"+(ml.fs&&ml.fs[n]==="ok"?"ละเอียด":"ไม่ละเอียด")));
    [1,2,3].filter(n=>(ml.mc||[]).indexOf(n)<0).forEach(n=>{
      let s=ml.mist&&ml.mist[n]==="broken"?"เสีย":"ไม่ได้ใช้";
      let note=ml.mino&&ml.mino[n]?"("+ml.mino[n]+")":"";
      millParts.push("เครื่อง"+n+":"+s+note);
    });
    let hasIssue=pk.st==="warn"||pk.se==="warn"||pk.sr==="warn"||pk.ex==="warn";
    let edLabels={stock_finish:"รับเข้า-จำหน่ายออกสินค้าสำเร็จรูป",stock_raw:"รับเข้า-จำหน่ายวัตถุดิบฯ",sys_doc:"เอกสารระบบ"};
    let edText=(ed.checks||[]).map(k=>edLabels[k]||k).join(", ")||"-";
    let lots=(rd.lots||[]).filter(l=>l.num).map(l=>{let c=lotSummary(l);return l.num+(c?" ("+c+")":"")+(l.fix&&l.fix!=="-"?" [แก้: "+l.fix+"]":"");}).join(", ")||"-";
    let RL={m1:"รอบ1เช้า",m2:"รอบ2เช้า",m3:"รอบ3เช้า",a1:"รอบ1บ่าย",a2:"รอบ2บ่าย",a3:"รอบ3เย็น"};
    let payload = {
      วันที่บันทึก: new Date().toISOString(),
      วันที่: ST.date,
      ผู้รายงาน: ST.rep,
      รอบ: RL[r.k]||r.k,
      เวลาจบ: rd.dt||"-",
      LOT: lots,
      บอยเลอร์: bOk?"ปกติ":"มีปัญหา",
      "กวน-เครื่อง": (st.am||[]).join(", ")||"-",
      "กวน-แบะแซ": st.sy==="ok"?"พอดีตามสัดส่วน":st.sy==="warn"?"ไม่พอดี":"-",
      "กวน-สี": st.col==="ok"||!st.col?"ปกติ":st.col==="dark"?"เข้ม":"สว่าง",
      "กวน-รส": st.fl==="ok"?"เปรี้ยวอมหวาน/ปกติ":st.fl==="warn"?"ไม่ปกติ"+(st.fln?" / "+st.fln:""):"-",
      "กวน-คะแนน": st.cs||"-",
      "โม่-เครื่องและการใช้งาน": millParts.join(", ")||"-",
      "โม่-คลุม": ml.cv==="ok"?"มิดชิดเรียบร้อย":ml.cv==="warn"?"ไม่มิดชิด":"-",
      "โม่-คะแนน": ml.cs||"-",
      "ตรวจวัตถุดิบเสร็จแล้วคันที่": (ml.vh||[]).join(",")||"-",
      "รอส่งโม่-สับปะรดสด": rmSummary(rmCheck,"pineapple"),
      "รอส่งโม่-มะละกอ": rmSummary(rmCheck,"papaya"),
      "รอส่งโม่-ของแห้ง": rmSummary(rmCheck,"dry"),
      "รอส่งโม่-อื่นๆ": rmSummary(rmCheck,"other"),
      "แพ็ค-เครื่อง": [pk.st,pk.se,pk.sr].map((v,i)=>v==="ok"?["สติกเกอร์","ซีล","รัดกล่อง"][i]:null).filter(Boolean).join(", ")||"-",
      "แพ็ค-Maint": pk.mt===true?"แจ้งซ่อม"+(pk.mn?" : "+pk.mn:""):"-",
      "แพ็ค-คะแนน": pk.cs||"-",
      "แพ็ค-ปั๊มวันหมดอายุ": pk.ex==="ok"?"ถูกต้อง":pk.ex==="warn"?"ไม่ถูกต้อง":"-",
      "แพ็ค-สุ่มชั่งน้ำหนัก": pk.wt==="ok"?"ตามเกณฑ์":pk.wt==="warn"?"ไม่ตามเกณฑ์"+(pk.wtn?" / "+pk.wtn:""):"-",
      "แพ็ค-รอยซีล": pk.sl==="ok"?"ตามเกณฑ์":pk.sl==="warn"?"ไม่ตามเกณฑ์":"-",
      "แพ็ค-บรรจุภัณฑ์": pk.pkg==="ok"?"ตามเกณฑ์":pk.pkg==="warn"?"ไม่ตามเกณฑ์":"-",
      เพิ่มเติม: edText+(ed.docDetail?" / "+ed.docDetail:"")+(ed.timestamp?" ["+ed.timestamp+"]":""),
    };
    try {
      let res = await fetch(SUPABASE_URL+TABLE, {
        method:"POST",
        headers: SUPABASE_HEADERS,
        body: JSON.stringify(payload)
      });
      if(!res.ok){
        let err = await res.text();
        errors.push(r.lb+": "+err);
      }
    } catch(e){
      errors.push(r.lb+": "+e.message);
    }
  }
  if(errors.length===0){
    setSyncBanner("saved","✅ บันทึกลง Supabase เรียบร้อยแล้ว!");
    toast("✅ บันทึกสำเร็จ "+doneRounds.length+" รอบ");
    // Clear draft after successful save
    setTimeout(()=>{ document.getElementById("syncBanner").classList.add("hidden"); },4000);
  } else {
    setSyncBanner("offline","❌ บันทึกไม่สำเร็จ: "+errors[0]);
    toast("❌ เกิดข้อผิดพลาด — ข้อมูลยังอยู่ในเครื่อง");
  }
}

/* ═══════════════════════════════════════════════════
   COPY TO LINE — ครบทุกหัวข้อ
═══════════════════════════════════════════════════ */
function buildFullReport(k){
  // returns full text string for one round
  let r=RM.find(x=>x.k===k); let rd=ST.rounds[k];
  let st=rd.stir||{}; let ml=rd.mill||{}; let pk=rd.pack||{}; let b=rd.boiler||{}; let ed=rd.ed||{};
  let rmCheck=ml.rmCheck||{}; let mist=ml.mist||{}; let mino=ml.mino||{};

  // LOTs
  let lotLines=(rd.lots||[]).filter(l=>l.num).map((l,i)=>{
    let c=lotSummary(l);
    return "  "+(i+1)+". "+l.num+(c?" ("+c+")":"")+(l.fix&&l.fix!=="-"?" [แก้ไข: "+l.fix+"]":"");
  });

  // บอยเลอร์
  let bOk=["temp","press","water","pump"].every(x=>b[x]==="ok")&&b.smoke==="none";
  let bLines=[];
  bLines.push("   อุณหภูมิ: "+(b.temp==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(b.notes&&b.notes.temp?" — "+b.notes.temp:"")));
  bLines.push("   แรงดัน: "+(b.press==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(b.notes&&b.notes.press?" — "+b.notes.press:"")));
  bLines.push("   ระดับน้ำ 2 หลอด: "+(b.water==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(b.notes&&b.notes.water?" — "+b.notes.water:"")));
  bLines.push("   น้ำยา/ปั๊ม: "+(b.pump==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(b.notes&&b.notes.pump?" — "+b.notes.pump:"")));
  bLines.push("   ควัน: "+(b.smoke==="none"?"✅ ไม่ดำ":b.smoke==="black"?"⚠️ ดำ"+(b.notes&&b.notes.smoke?" — "+b.notes.smoke:""):"-"));

  // โรงกวน
  let mcActive=[...st.am||[]].sort((a,b)=>a-b).join(", ")||"-";
  let inactStir=[1,2,3,4,5,6,7,8,9].filter(n=>!(st.am||[]).includes(n));
  let stirLines=[];
  stirLines.push("   เครื่องกวนที่ใช้: "+mcActive);
  if(inactStir.length>0){
    inactStir.forEach(n=>{
      let s=st.ist&&st.ist[n]==="broken"?"⚠️ เสีย":"ไม่ได้ใช้";
      let note=st.ino&&st.ino[n]?" ("+st.ino[n]+")":"";
      stirLines.push("   เครื่อง "+n+": "+s+note);
    });
  }
  stirLines.push("   เครื่องอบ: "+(st.ou==="yes"?"ใช้งาน — "+(st.ook==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(st.on2?" / "+st.on2:"")):st.ou==="no"?"ไม่ได้ใช้":"-"));
  stirLines.push("   แบะแซ/น้ำตาล: "+(st.sy==="ok"?"✅ พอดีตามสัดส่วน":"⚠️ ไม่พอดี")+(st.syn?" — "+st.syn:""));
  stirLines.push("   โทนสี: "+(st.col==="ok"?"✅ ปกติ":st.col==="dark"?"🔵 เข้มเกิน":st.col==="light"?"☀️ สว่างเกิน":"-")+(st.coln?" / "+st.coln:""));
  stirLines.push("   รสชาติ: "+(st.fl==="ok"?"✅ เปรี้ยวอมหวาน/ปกติ":st.fl==="warn"?"⚠️ ไม่ปกติ"+(st.fln?" / "+st.fln:""):"-"));
  stirLines.push("   การลงเอกสาร: "+(st.dr==="ok"?"✅ ครบถ้วน":st.dr==="warn"?"⚠️ ไม่ครบ"+(st.dn?" / "+st.dn:""):"-"));
  stirLines.push("   คะแนนความสะอาด: "+(st.cs||"-")+"/10"+(st.cn?" — "+st.cn:""));

  // โรงโม่
  let millLines=[];
  [1,2,3].forEach(n=>{
    if((ml.mc||[]).includes(n)){
      millLines.push("   เครื่อง "+n+": "+(ml.fs&&ml.fs[n]==="ok"?"✅ ละเอียด":"⚠️ ไม่ละเอียด")+(ml.fn&&ml.fn[n]?" — "+ml.fn[n]:""));
    } else {
      let s=mist[n]==="broken"?"⚠️ เสีย":"ไม่ได้ใช้";
      millLines.push("   เครื่อง "+n+": "+s+(mino[n]?" ("+mino[n]+")":""));
    }
  });
  millLines.push("   ตรวจวัตถุดิบเสร็จคันที่: "+((ml.vh||[]).join(", ")||"-"));
  if((ml.vh||[]).length>0){
    millLines.push("   สิ่งปนเปื้อนในรถ: "+(ml.ci===0?"✅ ไม่มี":ml.ci?"⚠️ คันที่ "+ml.ci+(ml.cn2?" / "+ml.cn2:""):"-"));
  }
  // วัตถุดิบรอส่งโม่
  let rmLabels={pineapple:"สับปะรดสด หัว/แกน",papaya:"มะละกอ",dry:"ของแห้ง",other:"อื่นๆ"};
  let anyRM=false;
  Object.keys(rmLabels).forEach(key=>{
    let ck=rmCheck[key]||{};
    if(ck.sel){
      anyRM=true;
      let detail=ck.detail?" ("+ck.detail+")":"";
      let res=ck.contam==="found"?"⚠️ พบสิ่งปนเปื้อน"+(ck.note?" / "+ck.note:""):"✅ ไม่พบสิ่งปนเปื้อน";
      millLines.push("   รอส่งโม่ — "+rmLabels[key]+detail+": "+res);
    }
  });
  if(!anyRM) millLines.push("   รอส่งโม่: ไม่มีวัตถุดิบรอส่ง");
  millLines.push("   คลุมผ้าหลังโม่: "+(ml.cv==="ok"?"✅ มิดชิด":"⚠️ ไม่มิดชิด"+(ml.cvn?" / "+ml.cvn:"")));
  millLines.push("   การลงเอกสาร: "+(ml.dr==="ok"?"✅ ครบถ้วน":ml.dr==="warn"?"⚠️ ไม่ครบ":"-"));
  millLines.push("   คะแนนความสะอาด: "+(ml.cs||"-")+"/10"+(ml.cn3?" — "+ml.cn3:""));

  // โรงแพ็ค
  let packLines=[];
  packLines.push("   เครื่องติดสติกเกอร์: "+(pk.st==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(pk.stn?" / "+pk.stn:"")));
  packLines.push("   เครื่องซีล: "+(pk.se==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(pk.sen?" / "+pk.sen:"")));
  packLines.push("   เครื่องรัดกล่อง: "+(pk.sr==="ok"?"✅ ปกติ":"⚠️ ไม่ปกติ"+(pk.srn?" / "+pk.srn:"")));
  packLines.push("   ปั๊มวันหมดอายุ: "+(pk.ex==="ok"?"✅ ถูกต้อง":"⚠️ ไม่ถูกต้อง")+(pk.exn?" / "+pk.exn:""));
  packLines.push("   สุ่มชั่งน้ำหนัก: "+(pk.wt==="ok"?"✅ ตามเกณฑ์":pk.wt==="warn"?"⚠️ ไม่ตามเกณฑ์"+(pk.wtn?" / "+pk.wtn:""):"-"));
  packLines.push("   รอยซีล: "+(pk.sl==="ok"?"✅ ตามเกณฑ์":pk.sl==="warn"?"⚠️ ไม่ตามเกณฑ์"+(pk.sln?" / "+pk.sln:""):"-"));
  packLines.push("   บรรจุภัณฑ์: "+(pk.pkg==="ok"?"✅ ตามเกณฑ์":pk.pkg==="warn"?"⚠️ ไม่ตามเกณฑ์"+(pk.pkgn?" / "+pk.pkgn:""):"-"));
  let hasIssue=pk.st==="warn"||pk.se==="warn"||pk.sr==="warn"||pk.ex==="warn";
  packLines.push("   แจ้งซ่อม: "+(hasIssue?(pk.mt===true?"⚠️ ต้องแจ้ง"+(pk.mn?" — "+pk.mn:""):"✅ ไม่ต้องแจ้ง"):"✅ ระบบปกติ"));
  packLines.push("   การลงเอกสาร: "+(pk.dr==="ok"?"✅ ครบถ้วน":pk.dr==="warn"?"⚠️ ไม่ครบ":"-"));
  packLines.push("   คะแนนความสะอาด: "+(pk.cs||"-")+"/10"+(pk.cn?" — "+pk.cn:""));
  if(pk.ct) packLines.push("   เวลาจบโรงแพ็ค: "+pk.ct+" น.");

  // เอกสารเพิ่มเติม
  let edLabels={stock_finish:"รับเข้า-จำหน่ายออกสินค้าสำเร็จรูป",stock_raw:"รับเข้า-จำหน่ายวัตถุดิบ/ส่วนผสม/บรรจุภัณฑ์/เคมีภัณฑ์",sys_doc:"เอกสารระบบ"};
  let edChecked=(ed.checks||[]).map(c=>edLabels[c]||c);
  let edLines=[];
  if(edChecked.length>0) edChecked.forEach(c=>edLines.push("   ✅ "+c));
  else edLines.push("   -");
  if(ed.docDetail) edLines.push("   รายละเอียด: "+ed.docDetail);
  if(ed.timestamp) edLines.push("   เวลาบันทึก: "+ed.timestamp);

  // assemble
  let sep="━━━━━━━━━━━━━━━━━━━━━━━━━━";
  let t="";
  t+="📊 รายงาน QC — บริษัท อัญชลี ฟรุ๊ต โปรดักส์ จำกัด\n";
  t+="📅 วันที่: "+ST.date+" | ⏰ "+r.lb+"\n";
  t+="👤 ผู้รายงาน: "+ST.rep+" | ⏱️ เสร็จสิ้น: "+rd.dt+" น.\n";
  t+=sep+"\n";

  t+="🏷️ LOT ผลิต ("+(lotLines.length||0)+" LOT)\n";
  if(lotLines.length) lotLines.forEach(l=>t+=l+"\n"); else t+="  -\n";
  t+="\n";

  t+="🔥 บอยเลอร์: ["+(bOk?"ปกติทุกรายการ":"⚠️ มีปัญหา")+"]\n";
  bLines.forEach(l=>t+=l+"\n");
  t+="\n";

  t+="🫙 โรงกวน: [คะแนน "+(st.cs||"-")+"/10]\n";
  stirLines.forEach(l=>t+=l+"\n");
  t+="\n";

  t+="⚙️ โรงโม่: [คะแนน "+(ml.cs||"-")+"/10]\n";
  millLines.forEach(l=>t+=l+"\n");
  t+="\n";

  t+="📦 โรงแพ็ค: [คะแนน "+(pk.cs||"-")+"/10]\n";
  packLines.forEach(l=>t+=l+"\n");
  t+="\n";

  t+="📋 งานเอกสารเพิ่มเติม\n";
  edLines.forEach(l=>t+=l+"\n");
  t+=sep;
  return t;
}

function doCopy(k){
  let txt=buildFullReport(k);
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast("📋 Copy แล้ว! วางใน LINE ได้เลย")).catch(()=>prompt("Copy:",txt)); }
  else { prompt("Copy:",txt); }
}

function doCopyAll(){
  let doneRounds=RM.filter(r=>ST.rounds[r.k].done);
  if(doneRounds.length===0){ toast("⚠️ ยังไม่มีรอบที่เสร็จ"); return; }
  let sep="━━━━━━━━━━━━━━━━━━━━━━━━━━";
  let txt="📊 สรุป QC ครบทุกรอบ — "+ST.date+"\n";
  txt+="👤 ผู้รายงาน: "+ST.rep+"\n";
  let allLots=[];
  RM.forEach(r=>{ ST.rounds[r.k].lots.forEach(l=>{ if(l.num) allLots.push({...l,round:r.lb}); }); });
  if(allLots.length>0){
    txt+=sep+"\n🏷️ LOT ชิมทั้งวัน ("+allLots.length+" LOT)\n";
    allLots.forEach((l,i)=>{ let c=lotSummary(l); txt+="  "+(i+1)+". "+l.num+" ["+l.round+"]"+(c?" ("+c+")":"")+(l.fix&&l.fix!=="-"?" [แก้: "+l.fix+"]":"")+"\n"; });
  }
  txt+=sep+"\n";
  doneRounds.forEach((r,i)=>{
    txt+=buildFullReport(r.k);
    if(i<doneRounds.length-1) txt+="\n\n";
  });
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast("📋 Copy ครบทุกรอบแล้ว!")); }
  else { prompt("Copy:",txt); }
}

   HISTORY — ครบทุกหัวข้อ แบบ expandable

let _histExpanded={};

function renderHistRow(r, idx){
  let bOk=(r["บอยเลอร์"]||"").includes("ปกติ");
  let hasWarn=Object.values(r).some(v=>typeof v==="string"&&v.includes("ไม่ปกติ")||typeof v==="string"&&v.includes("ไม่ตามเกณฑ์")||typeof v==="string"&&v.includes("ไม่มิดชิด")||typeof v==="string"&&v.includes("ไม่ครบ")||typeof v==="string"&&v.includes("ไม่ถูกต้อง")||typeof v==="string"&&v.includes("เสีย")||typeof v==="string"&&v.includes("แจ้งซ่อม"));
  let expanded=_histExpanded[idx];
  let roundColor={"รอบ1เช้า":"#245233","รอบ2เช้า":"#1565c0","รอบ3เช้า":"#b45309","รอบ1บ่าย":"#6a1b9a","รอบ2บ่าย":"#7b3f00","รอบ3เย็น":"#2e4a5a"};
  let cl=roundColor[r["รอบ"]]||"var(--g8)";

  function row(label,val,warn){
    if(!val||val==="-") return "";
    let isWarn=warn||(typeof val==="string"&&(val.includes("⚠️")||val.includes("ไม่")||val.includes("เสีย")||val.includes("แจ้งซ่อม")));
    return `<div style="display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--gr1);font-size:12px">
      <div style="width:130px;flex-shrink:0;color:var(--gr5);font-weight:600">${label}</div>
      <div style="flex:1;color:${isWarn?"var(--r5)":"var(--gr9)"};font-weight:${isWarn?"700":"400"}">${val}</div>
    </div>`;
  }
  function section(title,cl,rows){
    let content=rows.filter(x=>x).join("");
    if(!content) return "";
    return `<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:${cl};padding:6px 0;border-bottom:2px solid ${cl}20;margin-bottom:4px">${title}</div>
      ${content}
    </div>`;
  }

  let detail="";
  if(expanded){
    detail+=section("🏷️ LOT ผลิต","var(--g7)",[
      row("LOT",r["LOT"])
    ]);
    detail+=section("🔥 บอยเลอร์","#c0392b",[
      row("สรุป",r["บอยเลอร์"])
    ]);
    detail+=section("🫙 โรงกวน","var(--g7)",[
      row("เครื่องกวน",r["กวน-เครื่อง"]),
      row("แบะแซ/น้ำตาล",r["กวน-แบะแซ"]),
      row("โทนสี",r["กวน-สี"]),
      row("รสชาติ",r["กวน-รส"]),
      row("คะแนนสะอาด",r["กวน-คะแนน"]?r["กวน-คะแนน"]+"/10":""),
    ]);
    detail+=section("⚙️ โรงโม่","var(--gr7)",[
      row("เครื่องและการใช้งาน",r["โม่-เครื่องและการใช้งาน"]),
      row("ตรวจวัตถุดิบคันที่",r["ตรวจวัตถุดิบเสร็จแล้วคันที่"]),
      row("สับปะรดสด",r["รอส่งโม่-สับปะรดสด"]),
      row("มะละกอ",r["รอส่งโม่-มะละกอ"]),
      row("ของแห้ง",r["รอส่งโม่-ของแห้ง"]),
      row("อื่นๆ",r["รอส่งโม่-อื่นๆ"]),
      row("คลุมผ้า",r["โม่-คลุม"]),
      row("คะแนนสะอาด",r["โม่-คะแนน"]?r["โม่-คะแนน"]+"/10":""),
    ]);
    detail+=section("📦 โรงแพ็ค","var(--b6)",[
      row("เครื่อง (ปกติ)",r["แพ็ค-เครื่อง"]),
      row("ปั๊มวันหมดอายุ",r["แพ็ค-ปั๊มวันหมดอายุ"]),
      row("สุ่มชั่งน้ำหนัก",r["แพ็ค-สุ่มชั่งน้ำหนัก"]),
      row("รอยซีล",r["แพ็ค-รอยซีล"]),
      row("บรรจุภัณฑ์",r["แพ็ค-บรรจุภัณฑ์"]),
      row("แจ้งซ่อม",r["แพ็ค-Maint"]),
      row("คะแนนสะอาด",r["แพ็ค-คะแนน"]?r["แพ็ค-คะแนน"]+"/10":""),
    ]);
    detail+=section("📋 เอกสารเพิ่มเติม","var(--a5)",[
      row("งานเอกสาร",r["เพิ่มเติม"])
    ]);
  }

  return `<div class="hist-item" style="padding:0;overflow:hidden">
    <div style="padding:13px 16px;cursor:pointer" onclick="_histExpanded[${idx}]=!_histExpanded[${idx}];refreshHist()">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700;color:var(--g8)">📅 ${r["วันที่"]||"-"}</span>
            <span style="font-size:11px;font-weight:800;padding:2px 10px;border-radius:100px;background:${cl};color:#fff">${r["รอบ"]||"-"}</span>
          </div>
          <div style="font-size:12px;color:var(--gr5)">👤 ${r["ผู้รายงาน"]||"-"} · ⏱️ ${r["เวลาจบ"]||"-"} น.</div>
          ${r["LOT"]?`<div style="font-size:11px;color:var(--gr7);margin-top:3px;line-height:1.4">🏷️ ${r["LOT"]}</div>`:""}
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="hist-badge ${bOk?"ok":"warn"}">${bOk?"✅ บอยเลอร์ปกติ":"⚠️ บอยเลอร์มีปัญหา"}</span>
            ${hasWarn?`<span class="hist-badge warn">⚠️ มีรายการผิดปกติ</span>`:`<span class="hist-badge ok">✅ ทุกรายการปกติ</span>`}
          </div>
        </div>
        <div style="font-size:18px;color:var(--gr5);flex-shrink:0;margin-top:2px">${expanded?"▲":"▼"}</div>
      </div>
    </div>
    ${expanded?`<div style="padding:0 16px 14px;border-top:1px solid var(--gr1)">${detail}
      <button style="width:100%;margin-top:8px;padding:9px;border:1.5px solid var(--g4);border-radius:var(--rmd);background:var(--g0);color:var(--g7);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer" onclick="copyHistRow(${idx})">📋 Copy รายงานนี้ → LINE</button>
    </div>`:""}
  </div>`;
}

}

async function loadHist(){
  document.getElementById("histList").innerHTML='<div style="text-align:center;color:var(--gr5);padding:16px">⏳ กำลังโหลด...</div>';
  if(!_isOnline){
    document.getElementById("histList").innerHTML='<div style="text-align:center;color:var(--r5);padding:16px">📵 ออฟไลน์ — ไม่สามารถโหลดประวัติได้</div>';
    return;
  }
  try {
    let res = await fetch(SUPABASE_URL+TABLE+"?select=*&order=%E0%B8%A7%E0%B8%B1%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%9A%E0%B8%B1%E0%B8%99%E0%B8%97%E0%B8%B6%E0%B8%81.desc&limit=50", {
      headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY}
    });
    let data = await res.json();
    if(!Array.isArray(data)||data.length===0){
      document.getElementById("histList").innerHTML='<div style="text-align:center;color:var(--gr5);font-size:13px;padding:16px">ยังไม่มีข้อมูลประวัติ</div>';
      return;
    }
    _histData=data;
    _histExpanded={};
    refreshHist();
  } catch(e){
    document.getElementById("histList").innerHTML=`<div style="color:var(--r5);padding:12px">เกิดข้อผิดพลาด: ${e.message}</div>`;
  }
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
let _toastTimer=null;
function toast(msg){
  let t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove("show"),2800);
}
</script>
