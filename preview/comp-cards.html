<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { background:#fff; border-radius:14px; border:1px solid #d1d5db; box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05); overflow:hidden; }
  .card-head { padding:14px 16px; border-bottom:1px solid #f3f4f6; background:#f9fafb; display:flex; justify-content:space-between; align-items:center; }
  .card-title { font-size:16px; font-weight:700; color:#1a3a2a; }
  .card-body { padding:14px 16px; font-size:15px; color:#374151; }
  .lot-summary { background:#1a3a2a; color:#fff; border-radius:14px; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
  .big { font-family:var(--mono); font-size:40px; font-weight:800; color:#7ecf97; letter-spacing:-1px; line-height:1; }
  .sub { font-size:12px; opacity:.7; letter-spacing:.5px; text-transform:uppercase; }
  .row { display:flex; flex-direction:column; gap:10px; }
</style></head><body>
<div class="card-frame">
  <div class="row">
    <div class="card">
      <div class="card-head"><div class="card-title">ข้อมูลผู้รายงาน</div></div>
      <div class="card-body">วันที่ · ชื่อผู้รายงาน — two-col responsive form</div>
    </div>
    <div class="lot-summary">
      <div>
        <div class="sub">LOT ชิมทั้งวัน</div>
        <div style="font-size:18px;font-weight:700;margin-top:2px">รวมทุกรอบ</div>
      </div>
      <div class="big">42</div>
    </div>
  </div>
</div>
</body></html>
