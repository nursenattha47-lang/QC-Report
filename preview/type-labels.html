<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .specimen { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--gr1); }
  .specimen:last-child { border-bottom:0; }
  .meta { font-family:var(--mono); font-size:11px; color:var(--gr5); margin-left:auto; white-space:nowrap; font-weight:500; }
  .where { font-size:13px; color:var(--gr5); margin-top:4px; }
</style></head><body>
<div class="card-frame">
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#374151">วันที่ · STATUS · LOT NO.</div>
      <div class="where">label · กำกับช่องกรอกข้อมูล (UPPERCASE + tracked)</div>
    </div>
    <span class="meta">label 15/700</span>
  </div>
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="font-size:14px;color:#374151">บันทึกแล้ว · 09:42 น. · ผู้รายงาน อัญชลี</div>
      <div class="where">meta · ข้อมูลเสริมที่ไม่ใช่ค่าหลัก</div>
    </div>
    <span class="meta">meta 14/400</span>
  </div>
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div><span style="font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--g3);background:var(--g8);padding:5px 12px;border-radius:100px">บริษัท อัญชลี ฟรุ๊ต โปรดักส์ จำกัด</span></div>
      <div class="where">tiny eyebrow · ชื่อบริษัทบน topbar (ตัวเล็กที่สุด)</div>
    </div>
    <span class="meta">tiny 13/600</span>
  </div>
</div>
</body></html>
