<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .banner { padding:12px 16px; font-size:14px; font-weight:700; display:flex; justify-content:space-between; align-items:center; border-radius:6px; }
  .recovery { background:#1a3a2a; color:#fff; }
  .syncing { background:#fef3c7; color:#b45309; justify-content:center; }
  .saved { background:#e1f5e9; color:#245233; justify-content:center; }
  .offline { background:#fee2e2; color:#c53030; justify-content:center; }
  .btn-restore { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.45); border-radius:100px; padding:6px 16px; font-size:13px; font-weight:700; color:#fff; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; vertical-align:middle; }
</style></head><body>
<div class="card-frame">
  <div class="banner recovery">
    <span>พบข้อมูลที่บันทึกไว้ก่อนหน้า — ต้องการกู้คืนหรือไม่?</span>
    <div style="display:flex;gap:6px"><span class="btn-restore">กู้คืน</span></div>
  </div>
  <div class="banner saved"><span class="dot" style="background:#3d8c58"></span>บันทึกแล้ว · 09:42 น.</div>
  <div class="banner syncing"><span class="dot" style="background:#b45309"></span>กำลังบันทึก...</div>
  <div class="banner offline"><span class="dot" style="background:#c53030"></span>ออฟไลน์ — ข้อมูลบันทึกในเครื่องแล้ว จะส่งเมื่อมีสัญญาณ</div>
</div>
</body></html>
