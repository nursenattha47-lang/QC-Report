<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .field { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .lbl { font-family:var(--font); font-size:15px; font-weight:700; letter-spacing:.5px; color:#6b7280; text-transform:uppercase; }
  .inp, .ta, .sel { width:100%; padding:11px 14px; border:1.5px solid #d1d5db; border-radius:10px; font-family:var(--font); font-size:17px; color:#111827; background:#fff; outline:none; }
  .inp.focused { border-color:#3d8c58; box-shadow:0 0 0 3px rgba(61,140,88,.12); }
  .inp.prefilled { background:#f2faf5; border-color:#b5e8c5; }
  .ta { resize:vertical; min-height:60px; font-family:var(--font); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .hint { font-size:13px; color:#2e6b42; display:flex; align-items:center; gap:6px; }
  .hint-ic { font-family:var(--mono); font-weight:800; background:#2e6b42; color:#fff; width:16px; height:16px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:11px; }
  .date-wrap { position:relative; }
  .date-help { font-size:12px; color:var(--gr5); margin-top:4px; font-family:var(--mono); }
</style></head><body>
<div class="card-frame">
  <div class="row">
    <div class="field">
      <label class="lbl">วันที่</label>
      <div class="date-wrap">
        <input class="inp" type="text" value="26/05/2026"/>
      </div>
      <div class="date-help">รูปแบบ: DD/MM/YYYY · วันนี้อัตโนมัติ</div>
    </div>
    <div class="field">
      <label class="lbl">ชื่อผู้รายงาน</label>
      <input class="inp prefilled" type="text" value="อัญชลี"/>
      <div class="hint"><span class="hint-ic">✓</span>จำจากครั้งล่าสุด — แก้ไขเฉพาะถ้าเปลี่ยนคน</div>
    </div>
  </div>
  <div class="field" style="margin-bottom:0">
    <label class="lbl">Comment — ความนิ่ม / เหนียว / กลิ่น / สี</label>
    <textarea class="ta">เปรี้ยวอมหวาน หอมปกติ สีเข้มเล็กน้อยรอบ 3</textarea>
  </div>
</div>
</body></html>
