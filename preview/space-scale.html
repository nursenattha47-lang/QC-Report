<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display:grid; grid-template-columns:auto auto 1fr; gap:6px 14px; align-items:center; }
  .swatch { background:var(--g5); border-radius:3px; }
  .name { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--g8); }
  .px { font-family:var(--mono); font-size:11px; color:var(--gr5); }
</style></head><body>
<div class="card-frame">
  <div class="label">Spacing — 4 px base, used as gaps & padding</div>
  <div class="grid">
    <div class="swatch" style="width:4px;height:14px"></div>   <div class="name">sp-1</div> <div class="px">4 px · chip-cluster gap</div>
    <div class="swatch" style="width:8px;height:14px"></div>   <div class="name">sp-2</div> <div class="px">8 px · field stack</div>
    <div class="swatch" style="width:12px;height:14px"></div>  <div class="name">sp-3</div> <div class="px">12 px · card gap (vertical stack)</div>
    <div class="swatch" style="width:14px;height:14px"></div>  <div class="name">sp-4</div> <div class="px">14 px · card-body vertical padding</div>
    <div class="swatch" style="width:16px;height:14px"></div>  <div class="name">sp-5</div> <div class="px">16 px · wrap horizontal · card-body</div>
    <div class="swatch" style="width:20px;height:14px"></div>  <div class="name">sp-6</div> <div class="px">20 px</div>
    <div class="swatch" style="width:24px;height:14px"></div>  <div class="name">sp-7</div> <div class="px">24 px</div>
  </div>
</div>
</body></html>
