<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .specimen { display:flex; align-items:center; gap:14px; padding:10px 0; border-bottom:1px solid var(--gr1); }
  .specimen:last-child { border-bottom:0; }
  .meta { font-family:var(--mono); font-size:11px; color:var(--gr5); margin-left:auto; white-space:nowrap; font-weight:500; }
  .where { font-size:13px; color:var(--gr5); margin-top:4px; }
</style></head><body>
<div class="card-frame">
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="font-size:22px;font-weight:700;color:var(--g8);display:flex;align-items:center;gap:10px"><span style="font-size:24px">🌤️</span>รอบ2 เช้า</div>
      <div class="where">round-banner-name · ใช้บน header ของแต่ละรอบ</div>
    </div>
    <span class="meta">h1 22/700</span>
  </div>
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="font-size:20px;font-weight:700">ระบบ QC ประจำวัน</div>
      <div class="where">topbar-title · ชื่อแอปบน header</div>
    </div>
    <span class="meta">display 20/700</span>
  </div>
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="font-size:18px;font-weight:700">บันทึกลง Supabase</div>
      <div class="where">button label · ปุ่มหลักของแต่ละหน้า</div>
    </div>
    <span class="meta">h2 18/700</span>
  </div>
  <div class="specimen">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-family:var(--mono);font-size:40px;font-weight:800;color:var(--g3);background:var(--g8);padding:0 14px;border-radius:8px;letter-spacing:-1px;line-height:1.1">42</span>
        <span style="font-size:16px;color:var(--gr7)">LOT ชิมทั้งวัน</span>
      </div>
      <div class="where">numeric counter · ใช้บนการ์ดสรุปยอด LOT</div>
    </div>
    <span class="meta">numeric 40/800</span>
  </div>
</div>
</body></html>
