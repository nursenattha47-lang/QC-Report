<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .section { border:1px solid #d1d5db; border-radius:14px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .section-head { display:flex; justify-content:space-between; align-items:center; padding:16px; background:#fff; min-height:56px; }
  .section-title { font-size:16px; font-weight:700; display:flex; align-items:center; gap:10px; }
  .section-arrow { font-size:13px; color:#6b7280; font-family:var(--mono); }
  .section-arrow.open { transform:rotate(180deg); }
  .section-body { padding:14px 16px; background:#fff; border-top:1px solid #f3f4f6; font-size:15px; color:#374151; }
  .station-dot { width:8px; height:24px; border-radius:3px; }
</style></head><body>
<div class="card-frame">
  <div class="section">
    <div class="section-head"><div class="section-title" style="color:#245233"><span class="station-dot" style="background:#245233"></span>โรงกวน</div><span class="section-arrow open">▼</span></div>
    <div class="section-body">เครื่องกวน 1-9 · เครื่องอบ · แบะแซ/น้ำตาล · สี · รสชาติ · เอกสาร · คะแนนความสะอาด</div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title" style="color:#c0392b"><span class="station-dot" style="background:#c0392b"></span>บอยเลอร์</div><span class="section-arrow">▼</span></div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title" style="color:#374151"><span class="station-dot" style="background:#374151"></span>โรงโม่</div><span class="section-arrow">▼</span></div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title" style="color:#1d4ed8"><span class="station-dot" style="background:#1d4ed8"></span>โรงแพ็ค</div><span class="section-arrow">▼</span></div>
  </div>
</div>
</body></html>
